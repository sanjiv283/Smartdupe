services:
  - type: web
    name: smartdupe
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: COHERE_API_KEY
        sync: false        # you paste this manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: smartdupe-db
          property: connectionString

databases:
  - name: smartdupe-db
    plan: free
