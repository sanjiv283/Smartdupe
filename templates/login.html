<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartDupe — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── DARK THEME (default) ── */
    :root[data-theme="dark"] {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --error: #ff4d6d;
      --success: #00e5a0;
      --input-bg: #0a0a0f;
      --blob1: #7c3aed;
      --blob2: #00e5ff;
    }

    /* ── LIGHT THEME ── */
    :root[data-theme="light"] {
      --bg: #f0f4f9;
      --surface: #ffffff;
      --border: #ccd6e8;
      --accent: #0088aa;
      --accent2: #6d28d9;
      --text: #0d1117;
      --muted: #556070;
      --error: #dc2626;
      --success: #059669;
      --input-bg: #f8fafc;
      --blob1: #a78bfa;
      --blob2: #67e8f9;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
      opacity: 0.6;
    }
    [data-theme="light"] body::before { opacity: 0.3; }

    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.15; pointer-events: none;
      transition: background 0.5s;
    }
    [data-theme="light"] .blob { opacity: 0.10; }
    .blob-1 { width: 400px; height: 400px; background: var(--blob1); top: -100px; left: -100px; animation: blobFloat 8s ease-in-out infinite alternate; }
    .blob-2 { width: 300px; height: 300px; background: var(--blob2); bottom: -80px; right: -80px; animation: blobFloat 10s ease-in-out infinite alternate-reverse; }

    @keyframes blobFloat {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,20px) scale(1.1); }
    }

    /* ── THEME TOGGLE (top-right fixed) ── */
    .theme-toggle-fixed {
      position: fixed; top: 18px; right: 24px; z-index: 200;
      display: flex; align-items: center; gap: 7px;
      cursor: pointer; user-select: none;
    }
    .theme-toggle-track {
      width: 44px; height: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      position: relative;
      transition: background 0.3s, border-color 0.3s;
    }
    .theme-toggle-knob {
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      transition: transform 0.3s, background 0.3s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    [data-theme="light"] .theme-toggle-knob {
      transform: translateX(20px);
      background: #f59e0b;
    }
    .theme-icon { font-size: 14px; line-height: 1; }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%; max-width: 420px;
      animation: fadeUp 0.5s ease both;
      transition: background 0.3s, border-color 0.3s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .logo-text { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
    .logo-text span { color: var(--accent); }

    h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; color: var(--text); }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; font-family: 'Space Mono', monospace; }

    .tabs {
      display: flex; background: var(--bg);
      border-radius: 8px; padding: 4px;
      margin-bottom: 28px; gap: 4px;
      transition: background 0.3s;
    }
    .tab {
      flex: 1; padding: 8px; text-align: center;
      border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: 700;
      color: var(--muted); transition: all 0.2s;
      border: none; background: none;
    }
    .tab.active {
      background: var(--surface); color: var(--text);
      box-shadow: 0 0 0 1px var(--border);
    }

    .field { margin-bottom: 18px; }
    label {
      display: block; font-size: 12px; font-weight: 700;
      color: var(--muted); letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 8px;
      font-family: 'Space Mono', monospace;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
    }

    .btn {
      width: 100%; padding: 13px; border: none; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      margin-top: 8px; transition: opacity 0.2s, transform 0.15s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.6s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .message {
      margin-top: 14px; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; font-family: 'Space Mono', monospace; display: none;
    }
    .message.error   { background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3); color: var(--error); }
    .message.success { background: rgba(5,150,105,0.1);  border: 1px solid rgba(5,150,105,0.3); color: var(--success); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- ── DARK / LIGHT TOGGLE (fixed top-right) ── -->
  <div class="theme-toggle-fixed" onclick="toggleTheme()" title="Toggle dark / light mode">
    <span class="theme-icon">🌙</span>
    <div class="theme-toggle-track">
      <div class="theme-toggle-knob"></div>
    </div>
    <span class="theme-icon">☀️</span>
  </div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">Smart<span>Dupe</span></div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">// AI-powered file deduplication</p>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <div id="login-form">
      <div class="field">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="your_username" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn" id="login-btn" onclick="doLogin()">
        <span id="login-label">Sign In</span>
        <div class="spinner" id="login-spinner"></div>
      </button>
    </div>

    <div id="register-form" style="display:none">
      <div class="field">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="your_username" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <button class="btn" id="reg-btn" onclick="doRegister()">
        <span id="reg-label">Create Account</span>
        <div class="spinner" id="reg-spinner"></div>
      </button>
    </div>

    <div class="message" id="msg"></div>
  </div>

  <script>
    // ── THEME TOGGLE ─────────────────────────────────────────────────────────
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('sd-theme', theme);
    }
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }
    // Restore saved theme immediately on load
    (function () {
      applyTheme(localStorage.getItem('sd-theme') || 'dark');
    })();

    // ── TAB SWITCH ────────────────────────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) =>
        t.classList.toggle('active', (i === 0) === (tab === 'login'))
      );
      document.getElementById('login-form').style.display    = tab === 'login'    ? '' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
      hideMsg();
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text; el.className = 'message ' + type; el.style.display = 'block';
    }
    function hideMsg() { document.getElementById('msg').style.display = 'none'; }

    function setLoading(btnId, spinnerId, labelId, loading) {
      document.getElementById(btnId).disabled = loading;
      document.getElementById(spinnerId).style.display = loading ? 'block' : 'none';
      document.getElementById(labelId).style.display   = loading ? 'none'  : 'inline';
    }

    async function doLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      if (!username || !password) return showMsg('Please fill in all fields.', 'error');
      setLoading('login-btn', 'login-spinner', 'login-label', true);
      try {
        const res = await fetch('/login', { method: 'POST', body: new URLSearchParams({ username, password }) });
        const data = await res.json();
        if (!res.ok) return showMsg(data.detail || 'Login failed.', 'error');
        localStorage.setItem('token', data.access_token);
        showMsg('Login successful! Redirecting…', 'success');
        setTimeout(() => window.location.href = '/', 900);
      } catch { showMsg('Network error. Is the server running?', 'error'); }
      finally { setLoading('login-btn', 'login-spinner', 'login-label', false); }
    }

    async function doRegister() {
      const username = document.getElementById('reg-username').value.trim();
      const password = document.getElementById('reg-password').value;
      if (!username || !password) return showMsg('Please fill in all fields.', 'error');
      setLoading('reg-btn', 'reg-spinner', 'reg-label', true);
      try {
        const res = await fetch('/register', { method: 'POST', body: new URLSearchParams({ username, password }) });
        const data = await res.json();
        if (!res.ok) return showMsg(data.detail || 'Registration failed.', 'error');
        showMsg('Account created! Switching to login…', 'success');
        setTimeout(() => switchTab('login'), 1200);
      } catch { showMsg('Network error. Is the server running?', 'error'); }
      finally { setLoading('reg-btn', 'reg-spinner', 'reg-label', false); }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('login-form').style.display !== 'none') doLogin();
      else doRegister();
    });
  </script>
</body>
</html>
